# nome do workflow, aparece na "Actions"
name: Pipeline CI/CD
# quando o pipeline será disparado
on: 
  push:
    branches: 
    - master
    paths: # so dispara se arquivos nessas pastas mudarem
      - "src/**" # so mudanças no codigo fonte
      - ".github/workflows/**" # mudanças nos nossos proprios pipelines
  workflow_dispatch: # habilitar o botão "Run workflow" no Github Actions
  
jobs:
  # Primeiro job: build
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v6
        
      - name: Instalação do Node 
        uses: actions/setup-node@v4
        
        with:
          node-version: '20'
          cache: "npm"
          cache-dependency-path: package-lock.json 
          
      - name: Instalação das dependencias
        run: npm install
        
      - name: Rodar o Build
        run: npm run build

  tests:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v6
        
      - name: Instalação do Node 
        uses: actions/setup-node@v4
        
        with:
          node-version: '20'
          cache: "npm"
          cache-dependency-path: package-lock.json 
          
      - name: Instalação das dependencias
        run: npm install

      - name: Rodar o Lint
        run: npm run lint

      - name: Verificar Formatação
        run: npm run format -- -- check

      - name: Rodar Testes
        run: npm run test
