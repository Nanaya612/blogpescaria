# nome do workflow, aparece na "Actions"
name: Pipeline CI/CD
# quando o pipeline será disparado
on: 
  push:
    branches: 
    - master
  workflow_dispatch: # habilitar o botão "Run workflow" no Github Actions
  
jobs:
  # Primeiro job: build
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v6
      - name: Instalação do Node 
        uses: actions/setup-node@v4
        
        with:
          node-version: '20'
      - name: Instalação das dependencias
        run: npm install
      - name: Rodar o Build
        run: npm run build
